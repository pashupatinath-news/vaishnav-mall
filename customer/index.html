<!DOCTYPE html>
<html>
<head>
<title>VAISHNAV MALL - SHOP</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:sans-serif;background:#f4f4f4;margin:0}
.header{background:#222;color:white;padding:15px;text-align:center;font-size:20px;position:sticky;top:0}
.product{background:white;margin:10px;padding:15px;border-radius:10px;box-shadow:0 2px 5px #ccc}
.product img{width:100%;height:180px;object-fit:cover;border-radius:8px}
.price{color:green;font-weight:bold;font-size:18px}
button{background:#ff5722;color:white;border:none;padding:10px;width:100%;border-radius:5px;font-size:16px}
</style>
</head>
<body>

<div class="header">🛒 VAISHNAV MALL</div>

<div id="products">
<p style="text-align:center">Loading Products...</p>
</div>

<script>
// Demo Products - Baad me Firebase se live aayenge
let demoProducts = [
  {name:"Samsung Galaxy M14", price:"₹12999", img:"https://via.placeholder.com/400x300/28a745/fff?text=Mobile", detail:"8GB RAM, 128GB, 5000mAh"},
  {name:"Nike Air Max Shoes", price:"₹2499", img:"https://via.placeholder.com/400x300/007bff/fff?text=Shoes", detail:"Size: 7,8,9,10,11"},
  {name:"Basmati Rice 5KG", price:"₹499", img:"https://via.placeholder.com/400x300/ff5722/fff?text=Grocery", detail:"Premium Quality"}
];

let html = '';
demoProducts.forEach(p=>{
html += `
<div class="product">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.detail}</p>
<p class="price">${p.price}</p>
<button onclick="alert('Added to Cart ✅')">ADD TO CART</button>
</div>`
});
document.getElementById('products').innerHTML = html;
</script>

</body>
</html>
