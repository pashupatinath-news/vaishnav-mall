<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAISHNAV - Digital Mall</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF6600">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#FFF8F0}
    header{background:#FF6600;color:white;padding:15px;text-align:center;position:sticky;top:0;z-index:10}
    header h1{font-size:20px}
    .container{padding:15px}
    .product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .card{background:white;border-radius:12px;padding:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
    .card img{width:100%;height:120px;object-fit:cover;border-radius:8px}
    .card h3{font-size:14px;margin:8px 0;color:#333}
    .card p{color:#FF6600;font-weight:bold;font-size:16px}
    .btn{background:#FF6600;color:white;border:none;padding:8px 12px;border-radius:6px;width:100%;margin-top:8px;font-weight:bold}
    .cart-btn{position:fixed;bottom:20px;right:20px;background:#FF6600;color:white;border:none;border-radius:50%;width:55px;height:55px;font-size:24px;box-shadow:0 4px 8px rgba(0,0,0,0.3)}
  </style>
</head>
<body>

<header>
  <h1>🚩 VAISHNAV DIGITAL MALL</h1>
  <p>100% Pure Veg</p>
</header>

<div class="container">
  <h2 style="margin-bottom:12px;color:#FF6600">Fresh Products</h2>
  <div class="product-grid" id="productList">
    <p>Loading products...</p>
  </div>
</div>

<button class="cart-btn">🛒</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBCt-8L1Y39_ZVJXKuoDOoWvW26MK",
    authDomain: "vaishnav-mall.firebaseapp.com",
    projectId: "vaishnav-mall",
    storageBucket: "vaishnav-mall.appspot.com",
    messagingSenderId: "860038090103",
    appId: "1:860038090103:web:69800f46e4a0976a672",
    measurementId: "G-LSNWVC0B88"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadProducts(){
    const querySnapshot = await getDocs(collection(db, "products"));
    const productList = document.getElementById('productList');
    productList.innerHTML = "";
    if(querySnapshot.empty){
      productList.innerHTML = "<p>No products yet. Team se add karwao</p>";
    }
    querySnapshot.forEach((doc) => {
      let p = doc.data();
      productList.innerHTML += `
        <div class="card">
          <img src="${p.image}" alt="${p.name}">
          <h3>${p.name}</h3>
          <p>₹${p.price}</p>
          <button class="btn">Add to Cart</button>
        </div>
      `;
    });
  }
  loadProducts();
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
