<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAISHNAV DIGITAL MALL - PURE VEG</title>
<link rel="manifest" href="manifest.json"><meta name="theme-color" content="#FF6600">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}body{background:#FFF8F0}
.loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#FF6600;display:flex;justify-content:center;align-items:center;z-index:999;animation:fadeOut 2s 2s forwards;color:white;text-align:center;font-weight:900;font-size:20px}
@keyframes fadeOut{100%{opacity:0;visibility:hidden}}
.header{position:sticky;top:0;background:#FF6600;color:white;padding:12px;text-align:center;z-index:99;display:flex;justify-content:space-between;align-items:center}
.dark{background:#111;color:white}.dark .card{background:#222}
.timer{background:red;color:white;text-align:center;padding:5px;font-weight:bold}
.banner{height:160px;background:url('https://via.placeholder.com/400x160/FF6600/fff?text=DIWALI+OFFER') center/cover;border-radius:12px;margin:10px}
.search{width:90%;margin:10px 5%;padding:12px;border-radius:20px;border:1px solid #ccc}
.categories{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px}
.cat{text-align:center;background:white;padding:10px;border-radius:10px;box-shadow:0 2px 5px #0001;font-size:12px;font-weight:bold}
.section-title{padding:10px;color:#FF6600;font-weight:bold;font-size:18px}
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:white;border-radius:12px;padding:8px;box-shadow:0 2px 8px #0001}
.card img{width:100%;height:140px;object-fit:cover;border-radius:8px}
.btn{background:#FF6600;color:white;border:none;padding:10px;border-radius:8px;width:100%;font-weight:bold;margin-top:5px}
.affiliate{background:#FFEFD5;border:2px dashed #FF6600}
.fab{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;border-radius:50%;width:55px;height:55px;font-size:28px;border:none;z-index:99}
#loginBox,#cartBox{display:none;padding:20px;background:white;margin:10px;border-radius:10px}
input{width:90%;padding:10px;margin:8px 5%;border-radius:8px;border:1px solid #ccc}
</style>
</head>
<body>
<div class="loader">THE VAISHNAV'S<br>DIGITAL MALL<br><small>PURE VEG<br>JAI SHREE PASHUPATINATH 🚩</small></div>

<div class="header">
  <h2>VAISHNAV MALL</h2>
  <button onclick="document.body.classList.toggle('dark')">🌙</button>
</div>

<button class="btn" style="width:45%;margin:10px" onclick="loginBox.style.display='block'">LOGIN</button>
<button class="btn" style="width:45%;margin:10px" onclick="cartBox.style.display='block'">🛒 CART (<span id="cartCount">0</span>)</button>

<div id="loginBox">
  <h3>Mobile OTP Login</h3>
  <input id="phone" placeholder="+91 9876543210">
  <div id="recaptcha"></div>
  <button class="btn" onclick="sendOTP()">OTP BHEJO</button>
  <input id="otp" placeholder="OTP Daalo">
  <button class="btn" onclick="verifyOTP()">VERIFY</button>
</div>

<div class="timer">FLASH SALE ENDS IN: <span id="timer">02:59:59</span></div>
<div class="banner" id="mainBanner"></div>
<input id="search" class="search" placeholder="Search Product..." onkeyup="searchProducts()">

<h3 class="section-title">8 CATEGORIES</h3>
<div class="categories">
  <div class="cat">Hotel & Food</div><div class="cat">Grocery</div><div class="cat">Fashion</div><div class="cat">Education</div>
  <div class="cat">Jewellery</div><div class="cat">Property</div><div class="cat">Mobile & AC</div><div class="cat">Amazon</div>
</div>

<h3 class="section-title">LOCAL PRODUCTS 🔥</h3>
<div class="product-grid" id="localProducts"></div>

<h3 class="section-title">AMAZON DEALS 🛒</h3>
<div class="product-grid" id="affiliateProducts"></div>

<div id="cartBox">
  <h3>Your Cart</h3><div id="cartItems"></div><h3>Total: ₹<span id="cartTotal">0</span></h3>
  <button class="btn" onclick="placeOrder()">ORDER KARO</button>
</div>

<button class="fab" onclick="window.open('https://wa.me/919827896129')">💬</button>
<script src="app.js"></script>
</body>
</html>
