<!DOCTYPE html>
<html>
<head>
<title>VAISHNAV TEAM LOGIN</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:sans-serif;background:#222;color:white;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#333;padding:25px;border-radius:10px;width:90%;max-width:350px}
input,select{width:95%;padding:10px;margin:8px 0;border:none;border-radius:5px}
button{background:#28a745;color:white;border:none;padding:12px;width:100%;border-radius:5px;font-size:16px}
</style>
</head>
<body>
<div class="box">
<h2>VAISHNAV TEAM PANEL</h2>
<input id="phone" placeholder="Phone Number" value="9303100358">
<input id="pass" type="password" placeholder="Password" value="admin7">
<select id="role">
  <option>PRODUCT_TEAM</option>
  <option>OPERATION_TEAM</option>
  <option>CEO</option>
  <option>MD</option>
  <option>OWNER</option>
</select>
<button onclick="login()">LOGIN</button>
</div>
<script>
function login(){
  let phone = document.getElementById('phone').value;
  let pass = document.getElementById('pass').value;
  let role = document.getElementById('role').value;
  if(phone == "9303100358" && pass == "admin7"){
    localStorage.setItem('role', role);
    location.href = 'dashboard-panel.html';
  } else { alert("Galat Phone ya Password"); }
}
</script>
</body>
</html>
